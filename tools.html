        #dashboardPage { display: block; width: 100%; min-height: 100vh; background: #0f1419; }

        /* ===== TOP HEADER (FIXED) ===== */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #131a1f;
            border-bottom: 1px solid #2a333a;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }
        .top-header .logo img { max-height: 30px; }

        .top-header .left-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #mobileMenuToggle {
            display: none;
            font-size: 18px;
            color: #f0b90b;
            cursor: pointer;
            padding: 4px;
            background: transparent;
            border: none;
        }

        .user-dropdown {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .user-dropdown .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid #2a333a; }
        .user-dropdown .username-display {
            color: #f0b90b;
            font-weight: bold;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid #2a333a;
            background: #1e2830;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .user-dropdown .username-display:hover { background: #2a333a; }
        .user-dropdown .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #131a1f;
            border: 1px solid #2a333a;
            border-radius: 8px;
            min-width: 140px;
            padding: 5px 0;
            z-index: 1001;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        .user-dropdown .dropdown-menu.show { display: block; }
        .user-dropdown .dropdown-menu a {
            display: block;
            padding: 8px 16px;
            color: #d1d5db;
            text-decoration: none;
            transition: 0.3s;
            font-size: 13px;
        }
        .user-dropdown .dropdown-menu a i { margin-right: 8px; width: 16px; font-size: 13px; }
        .user-dropdown .dropdown-menu a:hover { background: #1f2a33; color: #f0b90b; }

        .top-header .nav-icons {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-direction: row-reverse;
        }
        .top-header .nav-icons i {
            font-size: 16px;
            color: #9aa6b2;
            cursor: pointer;
            transition: 0.3s;
            padding: 4px;
        }
        .top-header .nav-icons i:hover { color: #f0b90b; }
        .top-header .nav-icons .balance {
            background: #1e2830;
            padding: 4px 10px;
            border-radius: 20px;
            color: #f0b90b;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #2a333a;
            white-space: nowrap;
        }

        .sidebar-wrapper {

            top: 50px;
            left: 0;
            bottom: 0;
            width: 200px;

            background: #0f1419;
            min-height: calc(100vh - 50px);

            border: 1px solid #2a333a;
            padding: 24px 20px;

            margin-bottom: 20px;

            gap: 10px;

            font-size: 22px;
            font-weight: bold;

            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .tools-header .back-link:hover { color: #f0b90b; }

        .converter-box {
            background: #1a242c;
            border-radius: 10px;
            border: 1px solid #2a333a;
            padding: 20px;
            margin-bottom: 20px;
        }
        .converter-box label {
            color: #d1d5db;
            font-size: 14px;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }
        .converter-box textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0f1419;
            border: 1px solid #2a333a;
            border-radius: 8px;
            color: #d1d5db;
            font-size: 13px;
            font-family: 'Consolas', 'Courier New', monospace;
            outline: none;
            resize: vertical;
            min-height: 150px;
            line-height: 1.6;
            transition: 0.3s;
        }
        .converter-box textarea:focus {
            border-color: #f0b90b;
        }
        .converter-box textarea.readonly {
            opacity: 0.7;
            cursor: default;
            border-color: #2a333a;
            background: #0a0d10;
        }
        .converter-box textarea.readonly:focus {
            border-color: #2a333a;
        }

        .converter-actions {
            display: flex;
            justify-content: flex-end;
            margin: 20px 0;
            gap: 12px;
        }
        .converter-actions button {
            padding: 10px 30px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .converter-actions .btn-convert {
            background: #f0b90b;
            color: #0b0e11;
        }
        .converter-actions .btn-convert:hover {
            background: #d4a30a;
            transform: scale(1.02);
        }
        .converter-actions .btn-reset {
            background: #2a333a;
            color: #9aa6b2;
        }
        .converter-actions .btn-reset:hover {
            background: #3a4a5a;
        }

        .result-box {
            background: #0f1419;
            border-radius: 10px;
            border: 1px solid #2a333a;
            padding: 16px;
            margin-top: 10px;
            display: none;
            max-height: 500px;
            overflow: auto;
        }
        .result-box.show {
            display: block;
        }
        .result-box pre {
            color: #2ecc71;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }
        .result-box .error {
            color: #e74c3c;
        }

        @media (max-width: 768px) {
            .sidebar-wrapper { transform: translateX(-110%); transition: transform 0.3s ease; width: 240px; }
            .sidebar-wrapper.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 12px 10px; }
            .top-header { padding: 6px 10px; height: 44px; }
            .top-header .logo img { max-height: 24px; }
            .top-header .nav-icons .balance { font-size: 10px; padding: 2px 8px; }
            .top-header .nav-icons i { font-size: 14px; }
            .user-dropdown .username-display { font-size: 11px; padding: 2px 6px; }
            .user-dropdown .user-avatar { width: 22px; height: 22px; }
            #mobileMenuToggle { display: block; }
            .tools-container { padding: 16px 12px; }
            .tools-header h2 { font-size: 18px; }
            .converter-box textarea { min-height: 120px; font-size: 12px; }
            .result-box pre { font-size: 12px; }
        }
        @media (max-width: 500px) {
            .converter-actions { flex-direction: column; }
            .converter-actions button { width: 100%; text-align: center; }
        }
        @media (min-width: 769px) {
            .sidebar-wrapper { transform: translateX(0) !important; }
            .sidebar-overlay { display: none !important; }
        }
    </style>
</head>

    <script>
        // =============================================================
        // 1. CHECK USER
        // =============================================================
        function getUsers() { const users = localStorage.getItem('russian_market_users'); return users ? JSON.parse(users) : []; }
        function getCurrentUser() { return localStorage.getItem('russian_market_current_user'); }
        function clearCurrentUser() { localStorage.removeItem('russian_market_current_user'); }

        const currentUser = getCurrentUser();
        if (!currentUser) { window.location.href = 'index.html'; }

        const users = getUsers();
        const user = users.find(u => u.username === currentUser);
        if (!user) { window.location.href = 'index.html'; }

        document.getElementById('headerUsernameText').textContent = currentUser;
        document.getElementById('userBalance').innerHTML = `<i class="fas fa-wallet"></i> $${(user.balance || 0).toFixed(2)}`;

        // =============================================================
        // 2. LOGOUT & DROPDOWN
        // =============================================================
        const dropdownMenu = document.getElementById('userDropdownMenu');
        const userSection = document.getElementById('userSection');

        userSection.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-dropdown')) {
                dropdownMenu.classList.remove('show');
            }
        });

        document.getElementById('logoutLink').addEventListener('click', function(e) {
            e.preventDefault();
            clearCurrentUser();
            dropdownMenu.classList.remove('show');
            window.location.href = 'index.html';
        });

        // =============================================================
        // 3. MOBILE SIDEBAR
        // =============================================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('mobileMenuToggle');

        function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); document.body.style.overflow = ''; }

        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
        });
        overlay.addEventListener('click', closeSidebar);

        // =============================================================
        // 4. THEME TOGGLE
        // =============================================================
        let isDarkMode = true;
        document.getElementById('themeToggle').addEventListener('click', function() {
            const body = document.body;
            const sidebar = document.querySelector('.sidebar-wrapper');
            const mainContent = document.querySelector('.main-content');
            const topHeader = document.querySelector('.top-header');
            const container = document.querySelector('.tools-container');
            const dropdown = document.querySelector('.dropdown-menu');

            if (isDarkMode) {
                body.style.backgroundColor = '#f0f2f5';
                body.style.color = '#1a1a1a';
                sidebar.style.backgroundColor = '#ffffff';
                sidebar.style.borderRightColor = '#ddd';
                mainContent.style.backgroundColor = '#f0f2f5';
                topHeader.style.backgroundColor = '#ffffff';
                topHeader.style.borderBottomColor = '#ddd';
                if (container) { container.style.backgroundColor = '#ffffff'; container.style.borderColor = '#ddd'; }
                document.querySelectorAll('.converter-box').forEach(el => { el.style.backgroundColor = '#f0f0f0'; el.style.borderColor = '#ddd'; });
                document.querySelectorAll('.converter-box textarea').forEach(el => { el.style.backgroundColor = '#ffffff'; el.style.borderColor = '#ccc'; el.style.color = '#1a1a1a'; });
                document.querySelectorAll('.converter-box textarea.readonly').forEach(el => { el.style.backgroundColor = '#e8e8e8'; });
                if (dropdown) dropdown.style.backgroundColor = '#ffffff';
                document.querySelectorAll('.sidebar-wrapper ul li').forEach(li => li.style.color = '#333');
                document.querySelectorAll('.sidebar-wrapper ul li:hover, .sidebar-wrapper ul li.active').forEach(li => { li.style.backgroundColor = '#e0e0e0'; li.style.color = '#000'; });
                document.querySelector('.user-dropdown .username-display').style.backgroundColor = '#e0e0e0';
                document.querySelector('.user-dropdown .username-display').style.borderColor = '#ccc';
                document.querySelector('.user-dropdown .user-avatar').style.borderColor = '#ccc';
                document.querySelector('.result-box').style.backgroundColor = '#ffffff';
                document.querySelector('.result-box').style.borderColor = '#ccc';
                this.style.color = '#f0b90b';
                isDarkMode = false;
            } else {
                body.style.backgroundColor = '#0a0d10';
                body.style.color = '#d1d5db';
                sidebar.style.backgroundColor = '#131a1f';
                sidebar.style.borderRightColor = '#2a333a';
                mainContent.style.backgroundColor = '#0f1419';
                topHeader.style.backgroundColor = '#131a1f';
                topHeader.style.borderBottomColor = '#2a333a';
                if (container) { container.style.backgroundColor = '#131a1f'; container.style.borderColor = '#2a333a'; }
                document.querySelectorAll('.converter-box').forEach(el => { el.style.backgroundColor = '#1a242c'; el.style.borderColor = '#2a333a'; });
                document.querySelectorAll('.converter-box textarea').forEach(el => { el.style.backgroundColor = '#0f1419'; el.style.borderColor = '#2a333a'; el.style.color = '#d1d5db'; });
                document.querySelectorAll('.converter-box textarea.readonly').forEach(el => { el.style.backgroundColor = '#0a0d10'; });
                if (dropdown) dropdown.style.backgroundColor = '#131a1f';
                document.querySelectorAll('.sidebar-wrapper ul li').forEach(li => li.style.color = '#9aa6b2');
                document.querySelectorAll('.sidebar-wrapper ul li:hover, .sidebar-wrapper ul li.active').forEach(li => { li.style.backgroundColor = '#1f2a33'; li.style.color = '#ffffff'; });
                document.querySelector('.user-dropdown .username-display').style.backgroundColor = '#1e2830';
                document.querySelector('.user-dropdown .username-display').style.borderColor = '#2a333a';
                document.querySelector('.user-dropdown .user-avatar').style.borderColor = '#2a333a';
                document.querySelector('.result-box').style.backgroundColor = '#0f1419';
                document.querySelector('.result-box').style.borderColor = '#2a333a';
                this.style.color = '#9aa6b2';
                isDarkMode = true;
            }
        });

        // =============================================================
        // 5. CORE FUNCTION: CONVERT NETSCAPE TO JSON
        // =============================================================
        function convertCookies() {
            const input = document.getElementById('userInput').value;
            const resultBox = document.getElementById('resultBox');
            const resultOutput = document.getElementById('resultOutput');

            if (!input.trim()) {
                resultOutput.textContent = '⚠️ Please paste some Netscape cookies data into the input box.';
                resultOutput.className = 'error';
                resultBox.classList.add('show');
                return;
            }

            const lines = input.split('\n');
            const cookies = [];

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                const match = line.match(/^(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(\S+)\s+(.*)$/);
                if (match) {
                    const [, domain, flag, path, secure, expiration, name, value] = match;
                    cookies.push({
                        domain: domain,
                        flag: flag === 'TRUE' ? true : false,
                        path: path,
                        secure: secure === '1' || secure === 'TRUE' ? true : false,
                        expiration: expiration,
                        name: name,
                        value: value
                    });
                }
            }

            if (cookies.length === 0) {
                resultOutput.textContent = '❌ No valid Netscape cookie lines found. Please check the format.';
                resultOutput.className = 'error';
                resultBox.classList.add('show');
                return;
            }

            const jsonOutput = JSON.stringify(cookies, null, 2);
            resultOutput.textContent = jsonOutput;
            resultOutput.className = '';
            resultBox.classList.add('show');
        }

        // =============================================================
        // 6. RESET FIELDS
        // =============================================================
        function resetFields() {
            document.getElementById('userInput').value = '';
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('resultOutput').textContent = '';
        }

        console.log('✅ Tools page (Netscape to JSON Converter) loaded.');
    </script>
</body>
